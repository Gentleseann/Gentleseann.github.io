<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro</title>
    <style>

        #mainText{
        border-bottom: 2px solid #001f3f;
        margin: 0 10px;;
        }

        #bigRect {
        width: 50%;
        height: 25vh;
        display: block;
        text-align: center;
        border-radius: 20px;
        background-color: #001f3f;
        color: black;
        border: 2px solid #001f3f;
        margin: 40px auto;
        padding: 5vh;
        }

        #duration{
        font-size: 90px;
        color: white;
        }

        .buttons{
        display: inline-block;
        margin: 5vh;
        border: 1px solid white;
        color: white;
        background-color: #001f3f;
        text-decoration: none;
        cursor: pointer;
        padding: 10px;
        width: 250px;
        font-size: 30px;

        }

        .buttons:hover{
        background-color: #003366
        }

    </style>
</head>
<body>
<h1 id="mainText">Pomodoro</h1>
<div id="bigRect">
    <span id="duration">10</span><br>
    <button id="first" class="buttons">Start</button>
    <button id="second" class="buttons">Stop</button>
</div>


<script>
    var duration = document.getElementById("duration");
    var start = document.getElementById("first");
    var down = null;

    var countDown = function(){
    var timeLeft = parseFloat(duration.textContent);
    if (timeLeft >0){
        duration.textContent = timeLeft - 1;
        }else{
            window.clearInterval(down);
        }
    };
    var second = document.getElementById("second");
    first.addEventListener("click", function(){
        if(!down){
            down = setInterval(countDown, 1000);
            first.textContent = "Pause";
            second.textContent = "Stop";
            //second.id = "stop";   
        }else{
            clearInterval(down);
            down = null;
            first.textContent = "Resume";
            second.textContent = "Done";
            second.id = "done";
        }
    });
    //var stop = document.getElementById("stop");
    //stop.addEventListener("click", function(){
    //    duration.textContent = 10;
        
    //})

    var stop = document.getElementById("second");
    second.addEventListener("click", function(){
        duration.textContent = 10;
        window.clearInterval(down);
        first.textContent = "Start";
        down = null;
    })
</script>
</body>
</html>
