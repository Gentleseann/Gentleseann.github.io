<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <style>
        body{
        background-color: #001f3f;
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        overflow: hidden;
        }

        nav{
        background-color: black;
        margin: 0;
        width: 100%;
        line-height: 60px;
        position: fixed;
        top: 0;
        z-index: 1;

        }

        nav ul {
        float:right;
        margin: 0px 150px;
        list-style-type: none;
        }

        nav ul li{
        display: inline-block;
        line-height: 90px;
        }

        nav ul li a{
        text-decoration: none;
        }

        #myPlannerText{
        height: 48px;
        float: left;
        margin: 15px 8px;
        color: white;
        font-size: 28px;
        }

        #clock{
        height: 50px;
        margin: 20px 0px;
        float: left;
        margin-left: 25px;
        }

        #pomodoroText{
        color: white;
        font-size: 25px;
        font-family: serif;
        font-weight: bold;
        margin: 20px;
        }

        .rects {
        width: 31%;
        height: 83.5vh;
        display: inline-block;
        border-radius: 20px;
        background-color: black;
        color: black;
        text-align: center;
        border: 2px solid #001f3f;
        margin: 120px 1.06%;
        padding: 0;
        -webkit-animation: floatDown 1s cubic-bezier(0.4, 0.6, 0.2, 1);
        }

        @-webkit-keyframes floatDown {
    from {
        transform: translateY(-1200px); /* Initial position, adjust as needed */
    }
    to {
        transform: translateY(0);
        }
    }

        @media (max-width: 800px) {
            .rects {
                width: 80%; /* Adjust the width for smaller screens */
                display: block; /* Stack rectangles on top of each other */
                margin: 20px auto; /* Center the stacked rectangles */
            }
        }

        #rect1{
        float: left;
        }

        #rect2{
        }

        #rect3{
        float: right;
        }

        .contentTitle{
        color: white;
        margin-top: 60px;
        }

        .pomodoroShortcut{
        color: white;
        font-size: 25px;
        font-family: serif;
        font-weight: bold;
        margin: 10px;
        }

    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">
                <img id="clock" src="https://store-images.s-microsoft.com/image/apps.61549.13695741898563888.a55c84af-2860-4662-8505-864b03df8b0d.88ae2bb4-e5dc-4d8a-8f90-c855ff00754d">
                <h1 id="myPlannerText">Task Manager</h1>
            </a>

            <ul>
                <li><a href="pomodoro.html" id="pomodoroText">Pomodoro</a></li>
                <li><a href="" class="pomodoroShortcut">120</a></li>
                <li><a href="" class="pomodoroShortcut">90</a></li>
                <li><a href="" class="pomodoroShortcut">60</a></li>
                <li><a href="" class="pomodoroShortcut">40</a></li>
            </ul>
        </nav>

    </header>
    <div id="container">
        <div class="rects" id="rect1"><h2 id="priorityListText" class="contentTitle">Priority List</h2></div>
        <div class="rects" id="rect2"><h2 id="reminderText" class="contentTitle">Reminder</h2></div>
        <div class="rects" id="rect3"><h2 id="scheduleText" class="contentTitle">Schedule</h2></div>
    </div>






</body>
</html>
