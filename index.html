<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <style>
        body{
        background-color: white;
        margin: 0;
        padding: 0;
        font-family: sans-serif;
        overflow: hidden;
        background-image: url("https://www.wallpaperup.com/uploads/wallpapers/2012/09/10/13853/bac795c7b3b215ca5e868d5085f1710a-700.jpg");
        }

        nav{
        background-color: black;
        margin: 0;
        width: 100%;
        line-height: 60px;
        position: fixed;
        top: 0;

        }

        nav ul {
        float:right;
        margin: 0px 150px;
        list-style-type: none;
        }

        nav ul li{
        display: inline-block;
        line-height: 90px;
        }

        nav ul li a{
        text-decoration: none;
        }

        #myPlannerText{
        height: 48px;
        float: left;
        margin: 15px 8px;
        color: white;
        font-size: 28px;
        }

        #logo{
        height: 50px;
        margin: 20px 0px;
        float: left;
        margin-left: 20px;
        }

        #pomodoroText{
        color: white;
        font-size: 25px;
        font-family: serif;
        font-weight: bold;
        margin: 20px;
        }

        .rects {
        width: 31%;
        height: 83.5vh;
        display: inline-block;
        border-radius: 15px;
        background-color: white;
        color: black;
        text-align: center;
        line-height: 100px; /* Center text vertically */
        border: 2px solid black;
        margin: 120px 1%;
        padding: 0;
        }

        #rect1{
        float: left;
        }

        #rect2{
        }

        #rect3{
        float: right;
        }

        .contentTitle{
        color: black;
        margin-top: 160px;
        }

        .pomodoroShortcut{
        color: white;
        font-size: 25px;
        font-family: 'Baskerville', serif;
        font-weight: bold;
        margin: 10px;
        }

    </style>
</head>
<body>
    <header>
        <nav>
            <img id="logo" src="https://store-images.s-microsoft.com/image/apps.61549.13695741898563888.a55c84af-2860-4662-8505-864b03df8b0d.88ae2bb4-e5dc-4d8a-8f90-c855ff00754d">
            <h1 id="myPlannerText">Task Manager</h1>
            <ul>
                <li><a href="" id="pomodoroText">Pomodoro</a></li>
                <li><a href="" class="pomodoroShortcut">120</a></li>
                <li><a href="" class="pomodoroShortcut">90</a></li>
                <li><a href="" class="pomodoroShortcut">60</a></li>
                <li><a href="" class="pomodoroShortcut">40</a></li>
            </ul>
        </nav>

    </header>
    <div id="container">
        <div class="rects" id="rect1"><h2 id="priorityListText" class="contentTitle">Priority List</h2></div>
        <div class="rects" id="rect2"><h2 id="reminderText" class="contentTitle">Reminder</h2></div>
        <div class="rects" id="rect3"><h2 id="scheduleText" class="contentTitle">Schedule</h2></div>
    </div>






</body>
</html>
